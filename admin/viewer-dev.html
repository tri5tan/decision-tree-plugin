<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decision Tree Viewer — Dev</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .dev-title {
        position: fixed;
        top: 14px;
        left: 14%;
        transform: translateX(-50%);
        font-family: "Roboto", sans-serif;
        z-index: 9999;
        font-size: 14px;
        font-weight: bold;
        color: #333;
      }

      .buttons {
        position: fixed;
        top: 6px;
        right: 6px;
        display: flex;
        gap: 8px;
        z-index: 9999;
      }

      #dev-print-btn,
      #dev-png-btn {
        padding: 7px 14px;
        background: #1a1a2e;
        color: #fff;
        border: none;
        border-radius: 5px;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      }
      #dev-print-btn:hover,
      #dev-png-btn:hover {
        background: #2d2d4e;
      }

      @media print {
        #dev-print-btn,
        #dev-png-btn {
          display: none !important;
        }
      }
    </style>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Simulates the div that class-viewer-shortcode.php renders on the frontend -->
    <!-- Use height: inherit if embedded in parent with explicit height, or set explicit height here -->

    <div class="dev-title">Decision Tree Viewer — Dev</div>

    <div class="buttons">
      <button
        id="dev-png-btn"
        onclick="(window.dtDownloadPng || function () {})()"
      >
        ↓ PNG
      </button>
      <button
        id="dev-print-btn"
        onclick="(window.dtFitAndPrint || window.print)()"
      >
        🖨 Print diagram
      </button>
    </div>
    <!-- <div style="padding: 3rem;"> -->
    <div
      class="decision-tree-viewer"
      id="viewer-dev"
      style="width: 100%; height: 100vh; padding: 3rem"
      data-module-id="1"
    ></div>
    <!-- </div> -->
    <script type="module" src="/src/viewer-entry.tsx"></script>
  </body>
</html>
